name: security

# govulncheck on the self-hosted runner. CodeQL omitted (Code
# Scanning is a separate quota); add it back if needed.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'   # 04:00 UTC every Monday
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: govulncheck
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: $HOME/go/bin/govulncheck ./...
